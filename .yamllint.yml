---
extends: default
rules:
  line-length:
    max: 200
    level: warning
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
  comments:
    min-spaces-from-content: 1
  document-start:
    present: true
    level: warning
  indentation:
    spaces: 2
    indent-sequences: whatever
