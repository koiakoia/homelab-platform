# ci/security.yml - Security lint and scan jobs for overwatch
---

yamllint:
  stage: lint
  tags:
    - sentinel-iac
  script:
    - echo "Running yamllint on all YAML files..."
    - yamllint -c .yamllint.yml -f parsable . | tee yamllint-report.txt
  artifacts:
    when: always
    paths:
      - yamllint-report.txt
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

tflint:
  stage: lint
  tags:
    - sentinel-iac
  script:
    - echo "Running tflint on Terraform configs..."
    - |
      if [ -d "infrastructure" ]; then
        cd infrastructure
        tflint --init 2>/dev/null
        tflint --format json > ../tflint-report.json 2>&1
        cd ..
      fi
  artifacts:
    when: always
    paths:
      - tflint-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

trivy-iac:
  stage: security-scan
  tags:
    - sentinel-iac
  script:
    - echo "Running Trivy IaC misconfiguration scan..."
    - trivy fs --scanners misconfig --format json --output trivy-iac-report.json .
    - echo "Summary:"
    - trivy fs --scanners misconfig --severity HIGH,CRITICAL .
  artifacts:
    when: always
    paths:
      - trivy-iac-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

gitleaks:
  stage: security-scan
  tags:
    - sentinel-iac
  script:
    - echo "Running gitleaks secret detection..."
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json --no-git
    - echo "No secrets detected."
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 30 days
  allow_failure: false
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
